<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mmuta — Teach. Test. Trust.</title>
    <meta name="description" content="Run your school's CBT exams, get AI-graded results, and manage students across all your departments — in one platform." />
    <meta name="theme-color" content="#1a7fe8" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Mmuta" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/png" sizes="32x32" href="/logo.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/logo.png" />
    <link rel="shortcut icon" href="/logo.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/logo.png" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://mmuta-9me1.vercel.app/" />
    <meta property="og:title" content="Mmuta — Teach. Test. Trust." />
    <meta property="og:description" content="Run your school's CBT exams, get AI-graded results, and manage students across all your departments — in one platform." />
    <meta property="og:image" content="https://mmuta-9me1.vercel.app/og-banner.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:site_name" content="Mmuta" />

    <!-- Twitter / X Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@mmutang" />
    <meta name="twitter:title" content="Mmuta — Teach. Test. Trust." />
    <meta name="twitter:description" content="Run your school's CBT exams, get AI-graded results, and manage students — in one platform." />
    <meta name="twitter:image" content="https://mmuta-9me1.vercel.app/og-banner.png" />

    <!-- WhatsApp / Telegram also read og: tags above -->

    <!-- Static shell styles — removed once React hydrates -->
    <style>
      #prerender-shell {
        font-family: system-ui, -apple-system, sans-serif;
        background: #03060d;
        color: #fff;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        justify-content: center;
        padding: 80px 40px 40px;
        box-sizing: border-box;
      }
      #prerender-shell .badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 6px 14px;
        border-radius: 99px;
        border: 1px solid rgba(255,255,255,.12);
        font-size: 11px;
        font-weight: 700;
        letter-spacing: .12em;
        text-transform: uppercase;
        color: rgba(255,255,255,.45);
        margin-bottom: 28px;
      }
      #prerender-shell .badge-dot {
        width: 6px; height: 6px;
        border-radius: 50%;
        background: #1a7fe8;
      }
      #prerender-shell h1 {
        font-size: clamp(52px, 8vw, 88px);
        font-weight: 900;
        line-height: .95;
        letter-spacing: -.03em;
        margin: 0 0 28px;
        max-width: 700px;
      }
      #prerender-shell h1 span {
        background: linear-gradient(135deg, #1a7fe8 0%, #7c3aed 50%, #06b6d4 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      #prerender-shell p {
        font-size: 18px;
        color: rgba(255,255,255,.4);
        max-width: 500px;
        line-height: 1.6;
        margin: 0 0 40px;
      }
      #prerender-shell .cta-row {
        display: flex;
        gap: 16px;
        flex-wrap: wrap;
      }
      #prerender-shell .btn-primary {
        padding: 14px 32px;
        font-size: 15px;
        font-weight: 700;
        border-radius: 99px;
        border: none;
        background: linear-gradient(135deg, #1a7fe8, #7c3aed);
        color: #fff;
        cursor: pointer;
        text-decoration: none;
        display: inline-block;
      }
      #prerender-shell .btn-secondary {
        padding: 14px 32px;
        font-size: 15px;
        font-weight: 600;
        border-radius: 99px;
        border: 1px solid rgba(255,255,255,.12);
        background: transparent;
        color: rgba(255,255,255,.65);
        cursor: pointer;
        text-decoration: none;
        display: inline-block;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <!-- Static hero: visible before JS loads, crawlers see full content -->
      <div id="prerender-shell">
        <div class="badge"><span class="badge-dot"></span>Built for Schools in Nigeria</div>
        <h1>
          Run your school's exams,<br/>
          grading, and results<br/>
          <span>in one platform.</span>
        </h1>
        <p>Secure CBT exams. AI-graded results. Instant student scores. No paper, no delays, no WhatsApp-forwarded results.</p>
        <div class="cta-row">
          <a class="btn-primary" href="/login">Book a Demo</a>
          <a class="btn-secondary" href="/login">Log In</a>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {});
        });
      }
    </script>
  </body>
</html>
